name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  NEXT_PUBLIC_BASE_PATH: /SemperAdminPortal

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev

      - name: Secret scan
        run: |
          # Fail if any file contains patterns that look like hardcoded secrets.
          # Excludes node_modules, .next, out, and lock files.
          if grep -rE \
            '(api_key|apikey|secret|password|token|private_key)\s*[:=]\s*["'"'"'][A-Za-z0-9+/]{16,}["'"'"']' \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.mjs" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=out \
            .; then
            echo "Possible hardcoded secret detected. Review before merging."
            exit 1
          fi

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build static site
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
